name: Xamlizer CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'tests/**'
      - 'src/**'
  push:
    branches: [ "main", "actions" ]
    paths:
      - 'src/**'
      - 'version.json'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # https://github.com/dotnet/Nerdbank.GitVersioning/blob/main/doc/cloudbuild.md
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore dependencies
        run: dotnet restore tests/Xamlizer.Tests/Xamlizer.Tests.csproj
      - name: Build
        run: dotnet build tests/Xamlizer.Tests/Xamlizer.Tests.csproj --no-restore
      - name: Test
        run: dotnet test tests/Xamlizer.Tests/Xamlizer.Tests.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage"
      - name: Publish Code Coverage To PR
        uses: 5monkeys/cobertura-action@v13
        with:
          path: tests/Xamlizer.Tests/TestResults/*/coverage.cobertura.xml
          minimum_coverage: 5
          show_line: true
          show_branch: true
          show_missing: true

  build:
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # https://github.com/dotnet/Nerdbank.GitVersioning/blob/main/doc/cloudbuild.md
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore src/Xamlizer/Xamlizer.csproj
    - name: Build
      run: dotnet build src/Xamlizer/Xamlizer.csproj --no-restore --configuration Release
    - name: Pack
      run: dotnet pack src/Xamlizer/Xamlizer.csproj --no-build --configuration Release
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: drop
        path: |
          src/**/*.nupkg
          src/**/*.snupkg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      IS_PRERELEASE: true
      RELEASE_TITLE: v0.0.1
      VERSION_NAME: 0.0.1
      ARTIFACT_NAME: 'drop'
      ARTIFACTS: 'Artifacts/**/*.nupkg'

    permissions:
      id-token: write 
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Download artifacts
      id: download-artifact
      uses: actions/download-artifact@v4
      with:
        name: drop
        path: Artifacts/

    - name: Process NuGet Version
      shell: pwsh
      working-directory: Artifacts/
      id: process-version
      run: |
        $Artifact = Get-ChildItem -Recurse | Where-Object { $_.Name.EndsWith('.nupkg') -and $_.Name.StartsWith('Xamlizer.') } | Select-Object -First 1
        $ArtifactName = $Artifact.Name
        $Pattern = '\b\d+\.\d+\.\d+(-\w+)?\b'

        $Match = [regex]::Match($ArtifactName, $Pattern)

        if (!$Match.Success) {
            Write-Host "Unable to parse version number for artifact: $($ArtifactName)"
            exit
        }

        $ArtifactName = $Match.Value

        $IsPreRelease = $false

        if ($ArtifactName.Contains('-')) {
            $IsPreRelease = $true
        }

        if ($IsPreRelease) {
          echo "IS_PRERELEASE=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          echo "IS_PRERELEASE=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }

        echo "action_state=$ArtifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "VERSION_NAME=$ArtifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "RELEASE_TITLE=v$ArtifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        Write-Host "ArtifactName = $ArtifactName"
        Write-Host "Is PreRelease = $IsPreRelease"

    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.1
      with:
        custom_tag: ${{ env.VERSION_NAME }}
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - uses: ncipollo/release-action@main
      name: Create Release
      with:
        artifacts: 'Artifacts/**/*.nupkg,Artifacts/**/*.snupkg'
        artifactErrorsFailBuild: true
        draft: true
        generateReleaseNotes: true
        name: ${{ env.RELEASE_TITLE }}
        tag: ${{ env.VERSION_NAME }}
        prerelease: ${{ env.IS_PRERELEASE }}
        body: "TODO"

    - name: NuGet login (OIDC - temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: Axemasta

    - name: Publish NuGet
      run: |
        dotnet nuget push ${{ env.ARTIFACTS }} --source 'https://api.nuget.org/v3/index.json' --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate
